services:
  backend:
    build: ./portfolio-backend
    container_name: laravel-api
    ports:
      - "8000:8000"
    volumes:
      - ./portfolio-backend:/var/www
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_DATABASE: portfolio
      DB_USERNAME: root
      DB_PASSWORD: root

  frontend:
    build: ./front-end
    container_name: next-app
    ports:
      - "3000:3000"
    volumes:
      - ./front-end:/app
    depends_on:
      - backend

  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: portfolio
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: